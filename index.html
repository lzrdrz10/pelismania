  <style>
  /* ======= TU PRELOADER (sin cambios) ======= */
  :root {
    --preloader-time: 3s;
  }
  #preloader {
    position: fixed;
    inset: 0;
    background: #141414;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    transition: opacity 0.8s ease;
  }
  #preloader.hide { opacity: 0; pointer-events: none; }
  .preloader-content {
    text-align: center;
    color: #65615F;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
  }
  .preloader-content img {
    width: 220px;
    max-width: 80vw;
    filter: drop-shadow(0px -2px 9px #303030);
  }
  .prog-bar-wrapper {
    width: 205px;
    height: 6px;
    position: relative;
    border-radius: 50px;
    overflow: hidden;
  }
  .prog-bar-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #919191;
    border-radius: 50px;
  }
  .prog-bar {
    position: absolute;
    top: 0; left: 0;
    width: 0; height: 100%;
    background: linear-gradient(to right,#e300ff,#007cf0);
    border-radius: 50px;
    animation: loadbar var(--preloader-time) forwards;
  }
  @keyframes loadbar { to { width: 100%; } }
  .preloader-extra {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: center;
    font-size: 12px;
    gap: 8px;
  }
  .spinner div {
    width: 20px; height: 20px;
    border: 4px solid #65615F;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }


  </style>
</head>

    <style>
    /* ======= EFECTO DISNEY+ CON TAMAÑO FIJO ======= */
    .featured-container {
      display: flex;
      flex-direction: row;
      justify-content: space-evenly;
      gap: 15px;
      padding: 0 0 20px;
      overflow-x: auto;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .featured-container::-webkit-scrollbar { display: none; }

    .item {
      width: 35%;
      min-width: 35%;
      position: relative;
      padding: 15px;
      cursor: pointer;
      flex-shrink: 0;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .item__border {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      box-shadow: rgba(0, 0, 0, 0.69) 0px 26px 30px -10px, rgba(0, 0, 0, 0.73) 0px 16px 10px -10px;
      border-radius: 10px;
      border: 4px solid rgba(249, 249, 249, 0.1);
      transition: transform 250ms ease-in-out, border 250ms ease-in-out, box-shadow 250ms ease-in-out;
    }

    /* Imágenes normales y hover */
    .item__image,
    .item__image.hover-image {
      width: 100%;
      height: 100%;
      border-radius: 5px;
    }
    .item__image.hover-image {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 500ms ease-in-out;
      visibility: hidden;
      object-fit: cover;           /* ← 100% lleno siempre */
    }
    .item:hover .item__border {
      box-shadow: rgba(0, 0, 0, 0.8) 0px 40px 58px -16px, rgba(0, 0, 0, 0.72) 0px 30px 22px -10px;
      transform: scale(1.05);
      border: 4px solid rgba(249, 249, 249, 0.8);
    }
    .item:hover .item__image.hover-image {
      opacity: 1;
      visibility: visible;
      z-index: -1;
    }

    /* === ESPECIAL PARA EL LOGO DE LEGO === */
    .lego-special .item__image {           /* ← solo el logo normal */
      object-fit: contain !important;
      max-width: 100%;
      max-height: 100%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }
    /* El GIF de fondo (hover) siempre 100% lleno */
    .lego-special .item__image.hover-image {
      object-fit: cover !important;
      width: 100%;
      height: 100%;
    }

    /* Escritorio */
    @media only screen and (min-width: 992px) {
      .item {
        width: 20%;
        min-width: 20%;
      }
    }
    </style>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const preloader = document.getElementById("preloader");
  const duration = getComputedStyle(document.documentElement).getPropertyValue("--preloader-time").trim();
  const ms = parseFloat(duration) * (duration.includes("ms") ? 1 : 1000);
  setTimeout(() => { preloader.classList.add("hide"); }, ms);
});

// Cargar avatar (sin cambios)
document.addEventListener('DOMContentLoaded', () => {
  const avatarHeader = document.getElementById('avatarHeader');
  if (avatarHeader) {
    const iconoGuardado = localStorage.getItem('iconoUsuario');
    if (iconoGuardado) {
      avatarHeader.src = iconoGuardado;
      avatarHeader.onerror = () => {
        avatarHeader.src = "https://wallpapers.com/images/hd/netflix-profile-pictures-1000-x-1000-qo9h82134t9nv0j0.jpg";
      };
    }
  }
});
</script>
